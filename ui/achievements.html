<div class="modal" id="achievementsModal" aria-hidden="true">
  <div class="modal-card modal-card--muted achievements-card">
    <h3>Achievements</h3>
    <div class="achievements-summary" id="achievementsSummary">Loading achievements...</div>
    <div class="achievements-list" id="achievementsList">
      <div class="achievement-tile achievement-tile--empty" id="achievementsEmpty">Loading...</div>
    </div>
    <div class="modal-actions">
      <button id="achievementsClose" class="secondary icon-button modal-close" type="button" aria-label="Close">
        <img class="action-icon" src="imgs/x_button.png" alt="" />
      </button>
    </div>
  </div>
</div>
<div class="modal modal--leaderboard" id="achievementInfoModal" aria-hidden="true">
  <div class="modal-card modal-card--muted achievement-info-card" id="achievementInfoCard">
    <div class="achievement-info__icon" id="achievementInfoIcon">?</div>
    <strong class="achievement-info__title" id="achievementInfoTitle">Achievement</strong>
    <div class="achievement-info__description" id="achievementInfoDescription"></div>
    <div class="achievement-info__meta" id="achievementInfoMeta"></div>
    <div class="modal-actions">
      <button id="achievementInfoClose" class="secondary icon-button modal-close" type="button" aria-label="Close">
        <img class="action-icon" src="imgs/x_button.png" alt="" />
      </button>
    </div>
  </div>
</div>
