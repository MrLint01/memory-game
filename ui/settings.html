<div class="modal" id="settingsModal" aria-hidden="true">
  <div class="modal-card modal-card--muted">
    <h3>Settings</h3>
    <div class="settings-tabs" role="tablist" aria-label="Settings tabs">
      <button class="settings-tab is-active" type="button" role="tab" aria-selected="true" data-settings-tab="general">General</button>
      <button class="settings-tab" type="button" role="tab" aria-selected="false" data-settings-tab="controls">Controls</button>
      <button class="settings-tab" type="button" role="tab" aria-selected="false" data-settings-tab="audio">Audio</button>
      <button class="settings-tab" type="button" role="tab" aria-selected="false" data-settings-tab="appearance">Appearance</button>
    </div>
    <hr class="settings-divider" />
    <div class="controls">
      <div class="settings-pane is-active" data-settings-pane="general">
        <div class="control-group" id="playerNameSettingRow">
          <label for="playerNameSetting">Player name</label>
          <div class="player-name-field-row">
            <input id="playerNameSetting" type="text" maxlength="16" autocomplete="nickname" />
            <button id="playerNameRandomizeSetting" class="secondary player-name-randomize" type="button">Randomize</button>
          </div>
        </div>
        <div class="control-group control-group--keybinds">
          <label>Accessibility</label>
          <div class="checkboxes">
            <label>
              <input id="photosensitivityWarningToggle" type="checkbox" checked />
              Show photosensitivity warning before flash levels
            </label>
            <label>
              <input id="sandboxUnlockWarningToggle" type="checkbox" checked />
              Show warning before buying Sandbox items
            </label>
          </div>
        </div>
        <div class="control-group">
          <label>Gameplay</label>
          <div class="checkboxes">
            <label>
              <input id="autoAdvanceNextToggle" type="checkbox" checked />
              Auto-advance to next stage after clear
            </label>
            <label>
              <input id="autoRetryToggle" type="checkbox" checked />
              Auto-retry stage after fail
            </label>
            <label>
              <input id="autoStartStagePreviewToggle" type="checkbox" checked />
              Auto-start stage after preview opens
            </label>
          </div>
        </div>
        <div class="control-group">
          <label>Leaderboards</label>
          <div class="checkboxes">
            <label>
              <input id="leaderboardsEnabledToggle" type="checkbox" checked />
              Enable leaderboard reads and writes
            </label>
          </div>
        </div>
        <div class="control-group">
          <label>Progress</label>
          <div class="confirm-anchor">
            <div class="checkboxes">
              <button id="debugResetProgress" class="secondary" type="button">Reset Progress</button>
            </div>
            <div class="confirm-row confirm-popover" id="resetConfirmRow" hidden>
              <span>Reset all progress?</span>
              <div class="confirm-actions">
                <button id="resetConfirmYes" class="secondary" type="button" tabindex="-1">Yes</button>
                <button id="resetConfirmNo" class="secondary" type="button" tabindex="-1">No</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="settings-pane" data-settings-pane="controls" hidden>
        <div class="control-group">
          <label>Keyboard controls</label>
          <div class="checkboxes">
            <label>
              <input id="enterToNextToggle" type="checkbox" checked />
              Press Enter to move to next card input
            </label>
          </div>
        </div>
        <hr class="settings-divider settings-divider--section" />
        <div class="control-group control-group--keybinds">
          <label>Action keybinds</label>
          <div class="keybind-grid">
            <div class="keybind-row">
              <span>Retry level</span>
              <button id="keybindRetry" class="secondary keybind-btn" type="button">R</button>
            </div>
            <div class="keybind-row">
              <span>Next level</span>
              <button id="keybindStageNext" class="secondary keybind-btn" type="button">Enter</button>
            </div>
            <div class="keybind-row">
              <span>Quit level to menu</span>
              <button id="keybindStageQuit" class="secondary keybind-btn" type="button">Q</button>
            </div>
            <div class="keybind-row">
              <span>Sandbox home</span>
              <button id="keybindPracticeHome" class="secondary keybind-btn" type="button">H</button>
            </div>
            <div class="keybind-row">
              <span>Sandbox settings</span>
              <button id="keybindPracticeSettings" class="secondary keybind-btn" type="button">S</button>
            </div>
            <div class="keybind-row">
              <span>Toggle fullscreen</span>
              <button id="keybindFullscreen" class="secondary keybind-btn" type="button">F</button>
            </div>
          </div>
          <div id="keybindStatus" class="small" aria-live="polite"></div>
          <div class="keybind-reset-row">
            <button id="keybindResetDefaults" class="secondary" type="button">Reset keybinds</button>
          </div>
        </div>
      </div>
      <div class="settings-pane" data-settings-pane="appearance" hidden>
        <div class="control-group">
          <label>Animations</label>
          <div class="checkboxes">
            <label>
              <input id="successAnimationToggle" type="checkbox" checked />
              Show success animation
            </label>
            <label>
              <input id="flashCountdownToggle" type="checkbox" checked />
              Show flash countdown
            </label>
          </div>
        </div>
        <hr class="settings-divider settings-divider--section" />
        <div class="appearance-row">
          <div class="control-group">
            <label for="appearanceTheme">Theme</label>
            <select id="appearanceTheme">
              <option value="studio-light">Studio Light</option>
              <option value="night-red">Crimson Circuit</option>
              <option value="night-orange">Amber Afterburn</option>
              <option value="night-yellow">Golden Static</option>
              <option value="night-green">Viridian Pulse</option>
              <option value="night-blue">Sapphire Drift</option>
              <option value="night-purple">Ultraviolet Echo</option>
              <option value="night-pink">Rose Static</option>
              <option value="pastel-red">Strawberry Cream</option>
              <option value="pastel-orange">Peach Fizz</option>
              <option value="pastel-yellow">Lemon Souffle</option>
              <option value="pastel-green">Pistachio Cloud</option>
              <option value="pastel-blue">Bluebell Mist</option>
              <option value="pastel-purple">Lavender Taffy</option>
              <option value="pastel-pink">Cotton Candy</option>
            </select>
          </div>
          <div class="control-group">
            <label for="appearanceColorVision">Color vision</label>
            <select id="appearanceColorVision">
              <option value="standard">Standard</option>
              <option value="protanopia">Protanopia support</option>
              <option value="deuteranopia">Deuteranopia support</option>
              <option value="tritanopia">Tritanopia support</option>
              <option value="monochromacy">Monochromacy support</option>
            </select>
          </div>
        </div>
        <button id="appearanceShuffle" class="secondary" type="button">Shuffle theme</button>
      </div>
      <div class="settings-pane" data-settings-pane="audio" hidden>
        <div class="control-group">
          <label>Volume</label>
          <div class="audio-dial-grid">
            <div class="audio-dial-row">
              <label for="audioMasterVolume">
                General
                <span id="audioMasterValue" class="audio-dial-value">50%</span>
              </label>
              <input id="audioMasterVolume" type="range" min="0" max="100" step="1" value="50" />
            </div>
            <div class="audio-dial-row">
              <label for="audioMusicVolume">
                Music
                <span id="audioMusicValue" class="audio-dial-value">100%</span>
              </label>
              <input id="audioMusicVolume" type="range" min="0" max="100" step="1" value="100" />
            </div>
            <div class="audio-dial-row">
              <label for="audioEffectsVolume">
                Effects
                <span id="audioEffectsValue" class="audio-dial-value">100%</span>
              </label>
              <input id="audioEffectsVolume" type="range" min="0" max="100" step="1" value="100" />
            </div>
          </div>
        </div>
        <div class="control-group">
          <label>Audio tools</label>
          <div class="audio-dial-grid">
            <div class="audio-dial-row">
              <button id="audioTestSfx" class="secondary" type="button">Test effects</button>
              <button id="audioResetDefaults" class="secondary" type="button">Reset audio defaults</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button id="settingsClose" class="secondary icon-button modal-close" type="button" aria-label="Close">
        <img class="action-icon" src="imgs/x_button.png" alt="" />
      </button>
    </div>
  </div>
</div>
